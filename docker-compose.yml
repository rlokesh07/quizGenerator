services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: unkey
      MYSQL_DATABASE: unkey
    ports:
      - "3306:3306"
    volumes:
      - unkey_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-punkey"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - unkey_redis_data:/data

  unkey:
    image: ghcr.io/unkeyed/api:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_DSN: "root:unkey@tcp(mysql:3306)/unkey?parseTime=true"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  unkey_mysql_data:
  unkey_redis_data:
