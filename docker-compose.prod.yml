services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: unkey
    # No host port published: only reachable from other containers on the
    # "internal" network below.
    volumes:
      - unkey_mysql_data:/var/lib/mysql
      - ./unkey/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - unkey_redis_data:/data
    networks:
      - internal

  unkey:
    image: ghcr.io/unkeyed/unkey:v2.0.73
    restart: unless-stopped
    command: run api
    # Bound to loopback only, so scripts/bootstrap-unkey.sh can still hit
    # http://localhost:8080 from *on the box* during setup, without exposing
    # the raw API port to the internet. Public traffic goes through Caddy.
    ports:
      - "127.0.0.1:8080:7070"
    environment:
      UNKEY_DATABASE_PRIMARY: "root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/unkey?parseTime=true"
      UNKEY_REDIS_URL: "redis://redis:6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      UNKEY_DOMAIN: ${UNKEY_DOMAIN:?UNKEY_DOMAIN is required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - unkey
    networks:
      - internal

networks:
  internal:

volumes:
  unkey_mysql_data:
  unkey_redis_data:
  caddy_data:
  caddy_config:
